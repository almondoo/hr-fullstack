name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# 最小権限: CI はリポジトリ内容の読み取りのみ必要。
permissions:
  contents: read

# 同一ブランチ/PR の進行中ランは新しい push でキャンセルする。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend (Go)
  # ─────────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: backend
          args: --config .golangci.yml --timeout 5m

      - name: Test (race detector, testcontainers)
        # -p 1 runs packages sequentially, ensuring at most one testcontainers
        # PostgreSQL container exists at a time.  See internal/platform/testdb.
        run: go test ./... -race -timeout 600s -count=1 -p 1
        env:
          # testcontainers-go uses Ryuk reaper; keep Docker socket accessible
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # ─────────────────────────────────────────────
  # Frontend (React Router v7 + pnpm)
  # Skipped when frontend/ does not exist yet.
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # frontend/package.json に packageManager フィールドが無いため、ここで
          # pnpm のメジャーを明示する(最新 pnpm 9.x。pnpm-lock.yaml の
          # lockfileVersion 9.0 と互換)。未指定だと action がバージョンを解決できず失敗する。
          version: 9
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (high severity)
        run: pnpm audit --audit-level=high

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  # ─────────────────────────────────────────────
  # Terraform (IaC lint / validate)
  # Issue #9: terraform fmt -check + validate
  # ─────────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # 各モジュール / 環境を独立して検証
        dir:
          - infra/modules/network
          - infra/modules/database
          - infra/modules/container
          - infra/modules/secrets
          - infra/modules/waf
          - infra/environments/production
          - infra/environments/staging
          - infra/environments/development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.dir }}

      - name: terraform init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ matrix.dir }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ matrix.dir }}
