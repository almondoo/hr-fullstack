# HR SaaS - 開発用 Docker Compose
# サービス: api(Go + Gin + Air ホットリロード) / db(PostgreSQL)
# 注意: これは「ローカル開発用」設定です。本番では TLS・Secret管理・最小権限DBユーザー等を必ず適用してください。

services:
  db:
    image: postgres:17-alpine
    container_name: hr-saas-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # パスワードはデフォルトを設けず、未設定なら起動失敗させる（安全側）
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hr_saas}
      # hr_app ロール作成スクリプト(10-create-app-role.sh)が使用するパスワード
      HR_APP_DB_PASSWORD: ${HR_APP_DB_PASSWORD:?HR_APP_DB_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # initdb スクリプト: hr_app ロールをコンテナ初回起動時に作成する
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hr_saas}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hr-saas-api
    # 初回は go.mod を解決してから Air を起動（依存はリポジトリの import から自動解決）
    command: sh -c "go mod tidy && air -c .air.toml"
    environment:
      APP_ENV: "development"
      APP_PORT: "8080"
      HTTP_PORT: "8080"

      # アプリ用DB接続 (hr_app ロール — NOBYPASSRLS)
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "hr_app"
      DB_PASSWORD: ${HR_APP_DB_PASSWORD:?HR_APP_DB_PASSWORD must be set in .env}
      DB_NAME: ${POSTGRES_DB:-hr_saas}
      DB_SSLMODE: "disable"

      # 管理/マイグレーション用DB接続 (postgres スーパーユーザー)
      DB_ADMIN_USER: ${POSTGRES_USER:-postgres}
      DB_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}

      # 起動時に goose マイグレーションを実行する (dev では true)
      MIGRATE_ON_STARTUP: "true"

      # セッション Cookie 設定 (P1.3a 認証インフラ)
      # 本番では SESSION_COOKIE_SECURE=true に変更すること
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-hr_session}
      SESSION_TTL: ${SESSION_TTL:-24h}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}

      GIN_MODE: "debug"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app          # ソースをマウントしてホットリロード
      - go_mod_cache:/go/pkg/mod # モジュールキャッシュを永続化
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  go_mod_cache:
