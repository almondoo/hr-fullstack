root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "node_modules", "db/migrations"]
  delay = 1000
  stop_on_error = true

[misc]
  clean_on_exit = true
